name: ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "aggregation/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "aggregation/**"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            aggregation/src/requirements.txt
            aggregation/tests/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r aggregation/src/requirements.txt
          pip install -r aggregation/tests/requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

  terraform:
    name: terraform (fmt + validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aggregation/infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (backend disabled)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color
